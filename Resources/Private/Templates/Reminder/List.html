<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
    xmlns:be="http://typo3.org/ns/TYPO3/CMS/Backend/ViewHelpers"
    xmlns:core="http://typo3.org/ns/TYPO3/CMS/Core/ViewHelpers" data-namespace-typo3-fluid="true">
<f:layout name="Reminder/Default" />
<f:section name="main">
<table class="table table-striped table-hover">
    <thead>
        <tr>
            <th>
                <f:translate key="reminder.list.message" extensionName="oclock" />
            </th>
            <th>
                <f:translate key="reminder.list.date" extensionName="oclock" />
            </th>
            <th>
                <f:translate key="reminder.list.edit" extensionName="oclock" />
            </th>
            <th>
                <f:translate key="reminder.list.delete" extensionName="oclock" />
            </th>
        </tr>
    </thead>
    <tbody>
        <f:if condition="{reminders}">
            <f:then>
                <f:for each="{reminders}" as="reminder">
                    <tr data-reminder="{reminder.uid}">
                        <td class="col-responsive">
                            {reminder.message}
                        </td>
                        <td>
                            {reminder.datetime -> f:format.date(format:'r')}
                        </td>
                        <td>
                            <be:link.editRecord
                                uid="{reminder.uid}"
                                table="tx_oclock_reminder"
                                returnUrl="#"
                                class="reminder-edit"
                                additionalAttributes="{data-uid: reminder.uid}">
                                <core:icon identifier="actions-open" />
                            </be:link.editRecord>
                        </td>
                        <td>
                            <a href="#" class="reminder-delete" data-uid="{reminder.uid}">
                                <core:icon identifier="actions-delete" />
                            </a>
                        </td>
                    </tr>
                </f:for>
            </f:then>
            <f:else>
                <tr>
                    <td colspan="4">
                        <f:translate key="reminder.list.empty" extensionName="oclock" />
                    </td>
                </tr>
            </f:else>
        </f:if>
    </tbody>
</table>
</f:section>
</html>
